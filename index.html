<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AssetHQ Pro</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="container">
        <div class="glass-3d">
            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                <div>
                    <span class="input-tag">Total Wealth</span>
                    <h1 class="total-wealth" id="totalDisplay">$0</h1>
                </div>
                <button id="syncTrigger" class="clickable-sync-btn">
                    <i data-lucide="refresh-cw" class="sync-icon"></i>
                    <span>Sync Data</span>
                </button>
            </div>

            <div class="controls-grid">
                <div>
                    <span class="input-tag">Reporting Currency</span>
                    <select id="refCurrency" onchange="updateUI()"></select>
                </div>
                <div>
                    <span class="input-tag">Asset Type Filter</span>
                    <select id="typeFilter" onchange="updateUI()"></select>
                    <label class="check-box"><input type="checkbox" id="exType" onchange="updateUI()"> Exclude this type</label>
                </div>
                <div>
                    <span class="input-tag">Entity Filter</span>
                    <select id="countryFilter" onchange="updateUI()"></select>
                    <label class="check-box"><input type="checkbox" id="exCountry" onchange="updateUI()"> Exclude this entity</label>
                </div>
            </div>

            <div class="dashboard-summary">
                <div class="chart-container">
                    <canvas id="assetChart"></canvas>
                </div>
                <div>
                    <div class="summary-header">
                        <span class="input-tag">Breakdown</span>
                        <div class="tab-group">
                            <button class="tab active" onclick="setView('type', this)">Type</button>
                            <button class="tab" onclick="setView('country', this)">Entity</button>
                            <button class="tab" onclick="setView('currency', this)">CCY</button>
                        </div>
                    </div>
                    <div id="summaryDisplay"></div>
                </div>
            </div>
        </div>
    </div>
    <script src="./script.js"></script>
</body>
</html>
