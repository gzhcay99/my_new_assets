<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#fbbf24">
    <title>AssetHQ Pro - Dashboard</title>
    
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">

    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="container">
        <div class="glass-3d">
            <div class="header-main">
                <div class="header-left">
                    <span class="input-tag">Total Net Wealth</span>
                    <h1 id="totalDisplay">$0</h1>
                    <div id="changeIndicator" class="change-tag">+$0</div>
                </div>
                <div class="header-right">
                    <div class="chart-container">
                        <canvas id="assetChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="action-bar" style="display: flex; gap: 10px; margin-bottom: 25px;">
                <button id="syncTrigger" class="clickable-sync-btn" style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 10px;">
                    <i data-lucide="refresh-cw" class="sync-icon"></i>
                    <span>Sync Data</span>
                </button>
                <button id="clearCacheBtn" title="Clear Cache" style="background: rgba(255, 68, 68, 0.1); border: 1px solid rgba(255, 68, 68, 0.2); color: #ff4444; width: 50px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center;">
                    <i data-lucide="trash-2" style="width: 20px; height: 20px;"></i>
                </button>
            </div>

            <div class="filters-grid">
                <div class="filter-group">
                    <label>Reporting Currency</label>
                    <select id="refCurrency" onchange="updateUI()"></select>
                </div>
                <div class="filter-group">
                    <label>Asset Type</label>
                    <div style="display:flex; gap:5px;">
                        <select id="typeFilter" onchange="updateUI()"></select>
                        <input type="checkbox" id="exType" onchange="updateUI()" class="ex-check">
                    </div>
                </div>
                <div class="filter-group">
                    <label>Country</label>
                    <div style="display:flex; gap:5px;">
                        <select id="countryFilter" onchange="updateUI()"></select>
                        <input type="checkbox" id="exCountry" onchange="updateUI()" class="ex-check">
                    </div>
                </div>
            </div>

            <div class="tab-container">
                <button class="tab active" onclick="setView('type', this)">Type</button>
                <button class="tab" onclick="setView('country', this)">Country</button>
                <button class="tab" onclick="setView('currency', this)">Currency</button>
            </div>

            <div id="summaryDisplay" class="summary-list"></div>
            
            <div style="margin-top: 20px; text-align: center; font-size: 0.65rem; color: var(--text-muted); opacity: 0.5;">
                AssetHQ Pro v2.5 (App Mode Enabled)
            </div>
        </div>
    </div>

    <button id="pwaInstallBtn" style="display:none; position:fixed; bottom:30px; left:50%; transform:translateX(-50%); z-index:9999; background:#fbbf24; color:#000; padding:14px 28px; border-radius:30px; font-weight:800; border:none; box-shadow:0 10px 25px rgba(0,0,0,0.6); font-family:inherit; animation: bounce 2s infinite;">
        Install AssetHQ App
    </button>

    <script src="./script.js?v=2.5"></script>
    <script>
        // 1. Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('PWA: Service Worker Active'))
                    .catch(err => console.error('PWA: Registration Failed', err));
            });
        }

        // 2. Handle the "Install App" Prompt Logic
        let deferredPrompt;
        const installBtn = document.getElementById('pwaInstallBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            console.log('PWA: Ready for installation');
            e.preventDefault();
            deferredPrompt = e;
            // Show the custom install button
            installBtn.style.display = 'block';
        });

        installBtn.addEventListener('click', () => {
            installBtn.style.display = 'none';
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((choice) => {
                if (choice.outcome === 'accepted') {
                    console.log('PWA: User accepted install');
                }
                deferredPrompt = null;
            });
        });

        // 3. Lucide Icons
        document.addEventListener('DOMContentLoaded', () => {
            if (window.lucide) lucide.createIcons();
        });
    </script>

    <style>
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateX(-50%) translateY(0);}
            40% {transform: translateX(-50%) translateY(-10px);}
            60% {transform: translateX(-50%) translateY(-5px);}
        }
    </style>
</body>
</html>
