<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asset Detail - AssetHQ Pro</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="detail-page">
    <div class="container">
        <div class="glass-3d">
            <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 35px;">
                <button onclick="window.location.href='index.html'" class="back-btn" aria-label="Go Back">
                    <i data-lucide="arrow-left"></i>
                </button>
                <div>
                    <span class="input-tag" style="margin-bottom: 2px;">Filtering by</span>
                    <h1 id="detailTitle" style="font-size: 2.2rem; margin: 0; color: var(--prime); letter-spacing: -1px; line-height: 1.1;">
                        Loading...
                    </h1>
                </div>
            </div>
            
            <div id="detailsList" class="details-stack">
                <div style="padding: 40px; text-align: center; color: var(--text-muted); font-weight: 600;">
                    Fetching asset data...
                </div>
            </div>
        </div>
    </div>

    <script src="./script.js"></script>
    
    <script>
        // Initialize Lucide icons specifically for this page
        if (window.lucide) {
            lucide.createIcons();
        }
    </script>
</body>
</html>
