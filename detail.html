<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AssetHQ | Details</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="detail-page">
    <div class="container">
        <header class="glass-3d detail-header" style="display:flex; justify-content:space-between; align-items:center;">
            <button onclick="window.location.href='index.html'" class="back-btn">
                <i data-lucide="arrow-left"></i> DASHBOARD
            </button>
            <h2 id="detailTitle" style="color:var(--prime); margin:0;">Asset Details</h2>
        </header>

        <div id="detailList" class="asset-grid" style="margin-top:20px;"></div>
    </div>

    <script>
        const assets = JSON.parse(localStorage.getItem('assets')) || [];
        const rates = JSON.parse(localStorage.getItem('fx_rates')) || { USD: 1 };
        const params = new URLSearchParams(window.location.search);
        const view = params.get('view');
        const value = params.get('value');
        const ref = params.get('ref') || 'USD';

        document.getElementById('detailTitle').innerText = value;
        const fmt = new Intl.NumberFormat('en-CA', { maximumFractionDigits: 0 });

        const filtered = assets.filter(a => {
            if (view === 'type') return a.type === value;
            if (view === 'country') return a.country === value;
            if (view === 'currency') return a.currency === value;
            return false;
        });

        const list = document.getElementById('detailList');
        list.innerHTML = filtered.map(a => {
            const valInRef = (a.value / rates[a.currency]) * rates[ref];
            return `
                <div class="asset-item glass-3d">
                    <div>
                        <b class="asset-name">${a.name}</b><br>
                        <small style="color:var(--text-muted)">${a.country} | ${a.type}</small>
                    </div>
                    <div style="text-align:right">
                        <div class="asset-value">${fmt.format(a.value)} ${a.currency}</div>
                        <div style="color:var(--prime); font-size:0.85rem">≈ ${fmt.format(valInRef)} ${ref}</div>
                    </div>
                </div>
            `;
        }).join('');
        lucide.createIcons();
    </script>
</body>
</html>
