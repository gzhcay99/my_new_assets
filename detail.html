<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0a">
    <title>Asset Details - AssetHQ Pro</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="detail-page">
    <div class="container">
        <div class="glass-3d">
            <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px;">
                <button onclick="window.location.href='index.html'" class="back-btn" style="background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 12px; cursor: pointer;">
                    <i data-lucide="arrow-left"></i>
                </button>
                <div>
                    <span class="input-tag">Category Breakdown</span>
                    <h1 id="detailTitle" style="margin:0; font-size: 1.8rem; color: var(--prime);">Loading...</h1>
                </div>
            </div>
            
            <div id="detailsList" class="details-stack"></div>

            <div style="margin-top: 30px; text-align: center; font-size: 0.65rem; color: var(--text-muted); opacity: 0.5;">
                AssetHQ Pro v2.4
            </div>
        </div>
    </div>

    <script src="./script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (window.lucide) lucide.createIcons();
        });
    </script>
</body>
</html>
